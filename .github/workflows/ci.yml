name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  QT_VERSION: '6.7.3'

# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Статичний аналіз коду ──────────────────────────────────────────────────
  analyze:
    name: Static Analysis
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt and tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            qt6-webengine-dev \
            qt6-webchannel-dev \
            libgl-dev \
            cppcheck

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-and-quality

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build (required for CodeQL)
        run: cmake --build build --parallel $(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:cpp'

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,portability,performance \
            --std=c++17 \
            --library=qt \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --suppress=unknownMacro \
            --error-exitcode=1 \
            src/

  # ── 2. Windows x64 (.exe + ZIP) ───────────────────────────────────────────────
  build-windows:
    name: Windows x64 (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtwebengine qtwebchannel qtpositioning
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Stage portable deployment
        shell: pwsh
        run: |
          $version = (Select-String -Path CMakeLists.txt `
            -Pattern 'set\s*\(\s*APP_VERSION_FULL\s+"([^"]+)"').Matches[0].Groups[1].Value
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

          # windeployqt puts Qt DLLs/plugins into deploy\
          # EXE must be there too (Windows DLL search requires same directory)
          New-Item -ItemType Directory deploy\config | Out-Null
          Copy-Item build\Stepan.exe deploy\
          windeployqt --release --compiler-runtime --dir deploy build\Stepan.exe

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $portable = "Stepan-$env:APP_VERSION-windows-x64"
          # Copy staged files into named folder — no tar-bomb
          Copy-Item deploy $portable -Recurse
          Compress-Archive -Path $portable -DestinationPath "$portable.zip"

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Create NSIS installer
        shell: pwsh
        run: |
          $deployAbs = (Resolve-Path deploy).Path
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /INPUTCHARSET UTF8 `
            /DAPP_VERSION=$env:APP_VERSION `
            "/DDEPLOY_DIR=$deployAbs" `
            installer\stepan.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: Stepan-Windows-x64
          path: |
            Stepan-*-windows-x64.zip
            Stepan-*-windows-x64-Setup.exe
          retention-days: 30

  # ── 3. macOS (.dmg) ────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtwebengine qtwebchannel qtpositioning
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Create DMG with macdeployqt
        run: |
          VERSION=$(grep -m1 'set(APP_VERSION_FULL' CMakeLists.txt | sed 's/.*"\(.*\)".*/\1/')
          ARCH=$(uname -m)
          macdeployqt build/Stepan.app -dmg
          mv build/Stepan.dmg "Stepan-${VERSION}-macos-${ARCH}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: Stepan-macOS
          path: Stepan-*-macos-*.dmg
          retention-days: 30

  # ── 4. Linux x64 (tar.xz + AppImage + deb + rpm) ─────────────────────────────
  build-linux:
    name: Linux x64 (tar.xz + AppImage + deb + rpm)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            qt6-base-dev \
            qt6-webengine-dev \
            qt6-webchannel-dev \
            libgl-dev \
            patchelf \
            dpkg-dev \
            rpm

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Read version
        run: |
          echo "APP_VERSION=$(grep -m1 'set(APP_VERSION_FULL' CMakeLists.txt | sed 's/.*\"\(.*\)\".*/\1/')" \
            >> $GITHUB_ENV

      # ── tar.xz ──────────────────────────────────────────────────────────────
      - name: Create tar.xz
        run: |
          DESTDIR=$PWD/pkg cmake --install build
          tar -cJf "Stepan-${APP_VERSION}-linux-x64.tar.xz" \
            -C pkg/usr \
            bin/stepan

      # ── DEB ─────────────────────────────────────────────────────────────────
      - name: Create DEB package
        run: cd build && cpack -G DEB

      # ── RPM ─────────────────────────────────────────────────────────────────
      - name: Create RPM package
        run: cd build && cpack -G RPM

      # ── AppImage ────────────────────────────────────────────────────────────
      - name: Download linuxdeploy
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy*.AppImage

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          QMAKE: /usr/bin/qmake6
        run: |
          # Minimal AppDir — only stepan, no GeographicLib utilities
          # Icon must be named stepan.png to match Icon=stepan in the desktop file
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/stepan                    AppDir/usr/bin/
          cp build/stepan.desktop            AppDir/usr/share/applications/
          cp icons/icon-256x256.png          AppDir/usr/share/icons/hicolor/256x256/apps/stepan.png
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage
          find . -maxdepth 1 -name "*.AppImage" ! -name "linuxdeploy*" \
            -exec mv {} "Stepan-${APP_VERSION}-linux-x64.AppImage" \;

      - name: Collect packages
        run: |
          cp build/*.deb . 2>/dev/null || true
          cp build/*.rpm . 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: Stepan-Linux-x64
          path: |
            Stepan-*-linux-x64.tar.xz
            Stepan-*-linux-x64.AppImage
            *.deb
            *.rpm
          retention-days: 30

  # ── 5. Test Linux (DEB + AppImage + tar.xz) ──────────────────────────────────
  test-linux:
    name: Test Linux packages
    needs: build-linux
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Stepan-Linux-x64

      - name: Install Qt6 runtime + Xvfb
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            scrot \
            libqt6webenginewidgets6 \
            libqt6widgets6 \
            libqt6network6 \
            libqt6webchannel6

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x960x24 &
          echo "XVFB_PID=$!" >> $GITHUB_ENV
          echo "DISPLAY=:99"  >> $GITHUB_ENV
          sleep 1

      # ── DEB ─────────────────────────────────────────────────────────────────
      - name: DEB — install
        run: sudo apt-get install -y ./stepan_*.deb

      - name: DEB — CLI test
        run: |
          stepan --convert "37UDB1234567890" | tee /tmp/out.txt
          grep -qE "[0-9]+\.[0-9]+" /tmp/out.txt \
            || { echo "CLI: no coordinates in output"; exit 1; }

      - name: DEB — GUI smoke test (Xvfb)
        run: |
          QTWEBENGINE_DISABLE_SANDBOX=1 stepan &
          SMOKE_PID=$!
          sleep 5
          scrot /tmp/screenshot-deb.png 2>/dev/null || true
          if kill -0 $SMOKE_PID 2>/dev/null; then
            kill $SMOKE_PID; wait $SMOKE_PID 2>/dev/null || true
            echo "DEB GUI smoke: OK"
          else
            echo "DEB GUI smoke: FAILED (app exited within 5 s)"; exit 1
          fi

      - name: DEB — uninstall
        run: sudo apt-get remove -y stepan

      # ── AppImage ────────────────────────────────────────────────────────────
      - name: AppImage — CLI test
        run: |
          chmod +x Stepan-*-linux-x64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 \
            ./Stepan-*-linux-x64.AppImage --convert "37UDB1234567890" | tee /tmp/out.txt
          grep -qE "[0-9]+\.[0-9]+" /tmp/out.txt \
            || { echo "CLI: no coordinates in output"; exit 1; }

      - name: AppImage — GUI smoke test (Xvfb)
        run: |
          APPIMAGE_EXTRACT_AND_RUN=1 QTWEBENGINE_DISABLE_SANDBOX=1 \
            ./Stepan-*-linux-x64.AppImage &
          SMOKE_PID=$!
          sleep 5
          scrot /tmp/screenshot-appimage.png 2>/dev/null || true
          if kill -0 $SMOKE_PID 2>/dev/null; then
            kill $SMOKE_PID; wait $SMOKE_PID 2>/dev/null || true
            echo "AppImage GUI smoke: OK"
          else
            echo "AppImage GUI smoke: FAILED (app exited within 5 s)"; exit 1
          fi

      # ── tar.xz (портативна версія) ──────────────────────────────────────────
      - name: tar.xz — extract
        run: mkdir tartest && tar -xJf Stepan-*-linux-x64.tar.xz -C tartest

      - name: tar.xz — CLI test
        run: |
          tartest/bin/stepan --convert "37UDB1234567890" | tee /tmp/out.txt
          grep -qE "[0-9]+\.[0-9]+" /tmp/out.txt \
            || { echo "CLI: no coordinates in output"; exit 1; }

      - name: tar.xz — GUI smoke test (Xvfb)
        run: |
          QTWEBENGINE_DISABLE_SANDBOX=1 tartest/bin/stepan &
          SMOKE_PID=$!
          sleep 5
          scrot /tmp/screenshot-tarxz.png 2>/dev/null || true
          if kill -0 $SMOKE_PID 2>/dev/null; then
            kill $SMOKE_PID; wait $SMOKE_PID 2>/dev/null || true
            echo "tar.xz GUI smoke: OK"
          else
            echo "tar.xz GUI smoke: FAILED (app exited within 5 s)"; exit 1
          fi

      - name: Stop Xvfb
        if: always()
        run: kill $XVFB_PID 2>/dev/null || true

      - name: Upload Linux screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-linux
          path: /tmp/screenshot-*.png
          if-no-files-found: ignore
          retention-days: 7

  # ── 6. Test Linux RPM (Fedora) ───────────────────────────────────────────────
  test-linux-rpm:
    name: Test Linux RPM (Fedora)
    needs: build-linux
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
      options: --shm-size=2g

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Stepan-Linux-x64

      - name: Install Qt6 runtime + Xvfb + scrot
        run: |
          dnf install -y \
            xorg-x11-server-Xvfb \
            scrot \
            qt6-qtbase \
            qt6-qtwebengine \
            qt6-qtwebchannel

      - name: RPM — install
        run: dnf install -y ./stepan-*.rpm

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x960x24 &
          echo "XVFB_PID=$!" >> $GITHUB_ENV
          echo "DISPLAY=:99"  >> $GITHUB_ENV
          sleep 1

      - name: RPM — CLI test
        run: |
          stepan --convert "37UDB1234567890" | tee /tmp/out.txt
          grep -qE "[0-9]+\.[0-9]+" /tmp/out.txt \
            || { echo "CLI: no coordinates in output"; exit 1; }

      - name: RPM — GUI smoke test (Xvfb)
        run: |
          QTWEBENGINE_DISABLE_SANDBOX=1 stepan &
          SMOKE_PID=$!
          sleep 5
          scrot /tmp/screenshot-rpm.png 2>/dev/null || true
          if kill -0 $SMOKE_PID 2>/dev/null; then
            kill $SMOKE_PID; wait $SMOKE_PID 2>/dev/null || true
            echo "RPM GUI smoke: OK"
          else
            echo "RPM GUI smoke: FAILED (app exited within 5 s)"; exit 1
          fi

      - name: RPM — uninstall
        run: dnf remove -y stepan

      - name: Stop Xvfb
        if: always()
        run: kill $XVFB_PID 2>/dev/null || true

      - name: Upload RPM screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-linux-rpm
          path: /tmp/screenshot-rpm.png
          if-no-files-found: ignore
          retention-days: 7

  # ── 7. Test Windows (інсталятор + портативна версія) ─────────────────────────
  test-windows:
    name: Test Windows installer + portable
    needs: build-windows
    runs-on: windows-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Stepan-Windows-x64

      # ── Портативна версія ───────────────────────────────────────────────────
      - name: Portable — extract
        shell: pwsh
        run: Expand-Archive (Get-Item "Stepan-*-windows-x64.zip") -DestinationPath portable_test

      - name: Portable — CLI test
        shell: pwsh
        run: |
          $exe = (Get-ChildItem portable_test -Recurse -Filter "Stepan.exe")[0].FullName
          $out = & $exe --convert "37UDB1234567890" 2>&1 | Out-String
          Write-Host "Output: $out"
          if ($out -notmatch '\d+\.\d+') { throw "CLI: no coordinates in output" }

      - name: Portable — GUI smoke test
        shell: pwsh
        run: |
          $exe  = (Get-ChildItem portable_test -Recurse -Filter "Stepan.exe")[0].FullName
          $proc = Start-Process -FilePath $exe -WindowStyle Normal -PassThru
          Start-Sleep 5
          try {
            Add-Type -AssemblyName System.Drawing
            Add-Type -AssemblyName System.Windows.Forms
            $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
            $bmp.Save("screenshot-portable.png")
            $g.Dispose(); $bmp.Dispose()
            Write-Host "Screenshot saved: screenshot-portable.png"
          } catch { Write-Host "Screenshot failed: $_" }
          if ($proc.HasExited) {
            throw "Portable: app exited within 5 s (code $($proc.ExitCode))"
          }
          $proc.Kill(); $proc.WaitForExit()
          Write-Host "Portable GUI smoke: OK"

      # ── Інсталятор ──────────────────────────────────────────────────────────
      - name: Installer — silent install
        shell: pwsh
        run: |
          $setup = (Get-Item "Stepan-*-windows-x64-Setup.exe").FullName
          $proc  = Start-Process -FilePath $setup -ArgumentList "/S" -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "Installer failed (code $($proc.ExitCode))" }
          if (-not (Test-Path "C:\Program Files\Stepan\Stepan.exe")) {
            throw "Stepan.exe not found after installation"
          }
          Write-Host "Installation: OK"

      - name: Installer — CLI test
        shell: pwsh
        run: |
          $out = & "C:\Program Files\Stepan\Stepan.exe" --convert "37UDB1234567890" 2>&1 | Out-String
          Write-Host "Output: $out"
          if ($out -notmatch '\d+\.\d+') { throw "CLI: no coordinates in output" }

      - name: Installer — GUI smoke test
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "C:\Program Files\Stepan\Stepan.exe" `
            -WindowStyle Normal -PassThru
          Start-Sleep 5
          try {
            Add-Type -AssemblyName System.Drawing
            Add-Type -AssemblyName System.Windows.Forms
            $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
            $bmp.Save("screenshot-installed.png")
            $g.Dispose(); $bmp.Dispose()
            Write-Host "Screenshot saved: screenshot-installed.png"
          } catch { Write-Host "Screenshot failed: $_" }
          if ($proc.HasExited) {
            throw "Installed app exited within 5 s (code $($proc.ExitCode))"
          }
          $proc.Kill(); $proc.WaitForExit()
          Write-Host "Installer GUI smoke: OK"

      - name: Installer — silent uninstall + verify
        shell: pwsh
        run: |
          Start-Process -FilePath "C:\Program Files\Stepan\Uninstall.exe" `
            -ArgumentList "/S" -Wait
          if (Test-Path "C:\Program Files\Stepan\Stepan.exe") {
            throw "Uninstall failed: Stepan.exe still present"
          }
          Write-Host "Uninstall: OK"

      - name: Upload Windows screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-windows
          path: screenshot-*.png
          if-no-files-found: ignore
          retention-days: 7

  # ── 7. Test macOS (DMG) ───────────────────────────────────────────────────────
  test-macos:
    name: Test macOS DMG
    needs: build-macos
    runs-on: macos-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Stepan-macOS

      - name: Mount DMG and strip quarantine
        run: |
          hdiutil attach Stepan-*-macos-*.dmg -mountpoint /Volumes/Stepan -quiet
          xattr -r -c /Volumes/Stepan/Stepan.app

      - name: CLI test
        run: |
          /Volumes/Stepan/Stepan.app/Contents/MacOS/Stepan --convert "37UDB1234567890" \
            | tee /tmp/out.txt
          grep -qE "[0-9]+\.[0-9]+" /tmp/out.txt \
            || { echo "CLI: no coordinates in output"; exit 1; }

      - name: GUI smoke test
        run: |
          /Volumes/Stepan/Stepan.app/Contents/MacOS/Stepan &
          SMOKE_PID=$!
          sleep 5
          screencapture -x /tmp/screenshot-macos.png 2>/dev/null || true
          if kill -0 $SMOKE_PID 2>/dev/null; then
            kill $SMOKE_PID; wait $SMOKE_PID 2>/dev/null || true
            echo "macOS GUI smoke: OK"
          else
            echo "macOS GUI smoke: FAILED (app exited within 5 s)"; exit 1
          fi

      - name: Upload macOS screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-macos
          path: /tmp/screenshot-macos.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Unmount DMG
        if: always()
        run: hdiutil detach /Volumes/Stepan -quiet || true

  # ── 8. Deploy GitHub Pages ───────────────────────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: 'chore: update landing page'

  # ── 9. GitHub Release (тільки для тегів v*) ──────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-windows, build-macos, build-linux, test-linux, test-linux-rpm, test-windows, test-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Stepan-*-windows-x64.zip
            Stepan-*-windows-x64-Setup.exe
            Stepan-*-macos-*.dmg
            Stepan-*-linux-x64.tar.xz
            Stepan-*-linux-x64.AppImage
            *.deb
            *.rpm
